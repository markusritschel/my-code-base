site_name: My Code Base
nav:
  - Home: index.md
  - About: intro.md
  - Jupyter Notebooks: notebooks.ipynb
  - MD Notebooks: markdown-notebooks.md
  - Content: content.md
  - API: api.md
theme: 
  name: material
  language: en
  logo: logo.png
  favicon: https://squidfunk.github.io/mkdocs-material/assets/favicon.png
  icon:
    previous: fontawesome/solid/angle-left
    next: fontawesome/solid/angle-right
    repo: fontawesome/brands/github
    edit: material/pencil 
    view: material/eye
  palette:
    # scheme: default
    # primary: deep purple
    # accent: deep orange
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode+

  features:
    - navigation.instant
    # - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - toc.integrate 
    - search.suggest
    - search.highlight
    # - header.autohide
    - navigation.footer
    - content.action.edit
    - content.code.copy
    - content.code.select
    - content.code.annotate 

extra:
  homepage: #
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
  # version:
  #   provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/markusritschel
      name: Github user
  generator: false

copyright: Copyright &copy; 2024 Markus Ritschel
repo_url: https://github.com/markusritschel/my_code_base
repo_name: my_code_base
edit_uri: edit/main/docs/


markdown_extensions:
  - toc:
      title: On this page
      permalink: "&para;"
      permalink_title: Anchor link to this section for reference
      # baselevel: 2
      toc_depth: 3
      separator: "_"
  - abbr
  # - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - codehilite
  # - pymdownx.superfences
  # - pymdownx.arithmatex:
  #     generic: true
  # - pymdownx.betterem
  # - pymdownx.caret
  # - pymdownx.mark
  # - pymdownx.tilde
  # - awesome-pages
#   - material.extensions.preview:
#       targets:
#         include:
#           - index.md
#           - content.m  d

plugins:
  # - mkdocs_apidoc  # <-- !
  - mkdocs-jupyter
  - mkdocstrings:
      handlers:
        python:
          setup_commands:
            - import sys
            - sys.path.append('../src/')
          selection:
            new_path_syntax: true
          options:
            show_submodules: true
  #     # handlers:
  #     #   python:
  #         options:
  #           show_submodules: true
  - search
  - tags
