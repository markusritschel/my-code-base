name: docs

on:
  push:
    branches:
      - main
      - develop
      - documentation


jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v3
        with:
          python-version: 3.9
      - name: Install requirements for building docs
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade -r docsrc/docs_requirements.txt
      - name: Build docs
        run: |
          cd docsrc
          jb build .
      - uses: actions/upload-artifact@v2
        with:
          name: generated-docs
          path: |
            docsrc/_build/html
  

  deploy-gh-pages:
    needs: build-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download compiled book
        uses: actions/download-artifact@v2
        with:
          name: generated-docs
          path: docs

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
